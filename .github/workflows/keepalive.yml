name: DB Keep-Alive

# RETIRED: schedule removed. DB keep-alive is now handled by Uptime Robot
# hitting https://schnapp.bet/api/ping every 30 minutes, which is faster,
# free, and does not consume GitHub Actions runner minutes.
# This workflow is kept for manual dispatch only as a diagnostic tool.

on:
  workflow_dispatch:

jobs:
  ping:
    runs-on: [self-hosted, schnapp-runner]
    steps:
      - name: Ping web app to wake database
        run: |
          curl -sf -o /dev/null \
            "https://schnapp.bet/api/ping" \
            && echo "Ping succeeded" \
            || echo "Ping failed (non-fatal)"
