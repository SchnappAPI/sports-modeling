name: DB Keep-Alive

on:
  schedule:
    # Every 45 minutes from 10:00 to 05:00 UTC (covers 5am-midnight CT)
    - cron: '0,45 10-23 * * *'
    - cron: '0,45 0-5 * * *'

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping web app to wake database
        run: |
          curl -sf -o /dev/null \
            "https://red-smoke-0bbe1fb10.2.azurestaticapps.net/api/ping" \
            && echo "Ping succeeded" \
            || echo "Ping failed (non-fatal)"
