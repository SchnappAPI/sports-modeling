name: Odds ETL

# Schedule: daily upcoming run at 10:00 UTC.
# Manual: defaults to running the full discover → backfill → mappings pipeline.
# Set mode=upcoming to run the upcoming fetch manually instead.

on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: "pipeline (default) | upcoming | discover | backfill | mappings | probe"
        required: false
        default: "pipeline"
      sport:
        description: "nfl, nba, mlb, or all"
        required: false
        default: "nba"
      season:
        description: "Season year. Leave blank for auto-detect."
        required: false
        default: ""
      snapshots:
        description: "Discover: max calendar dates to walk."
        required: false
        default: "15"
      games:
        description: "Backfill: max events to process."
        required: false
        default: "30"
      days_ahead:
        description: "Upcoming mode: days ahead to fetch."
        required: false
        default: "1"
      budget:
        description: "Max credits per backfill run. 0 = unlimited."
        required: false
        default: "0"

env:
  AZURE_SQL_SERVER:   ${{ secrets.AZURE_SQL_SERVER }}
  AZURE_SQL_DATABASE: ${{ secrets.AZURE_SQL_DATABASE }}
  AZURE_SQL_USERNAME: ${{ secrets.AZURE_SQL_USERNAME }}
  AZURE_SQL_PASSWORD: ${{ secrets.AZURE_SQL_PASSWORD }}
  ODDS_API_KEY:       ${{ secrets.ODDS_API_KEY }}

jobs:
  odds-etl:
    runs-on: [self-hosted, schnapp-runner]
    steps:
      - uses: actions/checkout@v4

      - name: Activate virtualenv
        run: echo "$HOME/venv/bin" >> $GITHUB_PATH

      - name: Upcoming (scheduled daily or explicit)
        if: |
          github.event_name == 'schedule' ||
          github.event.inputs.mode == 'upcoming'
        run: |
          DAYS="${{ github.event.inputs.days_ahead || '1' }}"
          SPORT="${{ github.event.inputs.sport || 'nba' }}"
          python etl/odds_etl.py --mode upcoming --sport $SPORT --days-ahead $DAYS

      - name: Discover (pipeline or explicit)
        if: |
          github.event.inputs.mode == 'pipeline' ||
          github.event.inputs.mode == 'discover'
        run: |
          SPORT="${{ github.event.inputs.sport || 'nba' }}"
          SNAPS="${{ github.event.inputs.snapshots || '15' }}"
          SEASON="${{ github.event.inputs.season }}"
          FLAGS="--mode discover --sport $SPORT --snapshots $SNAPS"
          [ -n "$SEASON" ] && FLAGS="$FLAGS --season $SEASON"
          python etl/odds_etl.py $FLAGS

      - name: Backfill (pipeline or explicit)
        if: |
          github.event.inputs.mode == 'pipeline' ||
          github.event.inputs.mode == 'backfill'
        run: |
          SPORT="${{ github.event.inputs.sport || 'nba' }}"
          GAMES="${{ github.event.inputs.games || '30' }}"
          BUDGET="${{ github.event.inputs.budget || '0' }}"
          SEASON="${{ github.event.inputs.season }}"
          FLAGS="--mode backfill --sport $SPORT --games $GAMES --budget $BUDGET"
          [ -n "$SEASON" ] && FLAGS="$FLAGS --season $SEASON"
          python etl/odds_etl.py $FLAGS

      - name: Mappings (pipeline or explicit)
        if: |
          github.event.inputs.mode == 'pipeline' ||
          github.event.inputs.mode == 'mappings'
        run: |
          SPORT="${{ github.event.inputs.sport || 'nba' }}"
          python etl/odds_etl.py --mode mappings --sport $SPORT

      - name: Probe (explicit only)
        if: github.event.inputs.mode == 'probe'
        run: |
          SPORT="${{ github.event.inputs.sport || 'nba' }}"
          python etl/odds_etl.py --mode probe --sport $SPORT
