name: Odds ETL

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "probe = coverage discovery only | backfill = ingest historical odds"
        required: false
        default: "backfill"
      sport:
        description: "nfl, nba, mlb, or all"
        required: false
        default: "all"
      season:
        description: "Season year (e.g. 2024). Leave blank for auto-detect."
        required: false
        default: ""
      games:
        description: "Max events to process per backfill run"
        required: false
        default: "10"
      quota_floor:
        description: "Stop if remaining credits fall below this"
        required: false
        default: "50000"

env:
  AZURE_SQL_SERVER:   ${{ secrets.AZURE_SQL_SERVER }}
  AZURE_SQL_DATABASE: ${{ secrets.AZURE_SQL_DATABASE }}
  AZURE_SQL_USERNAME: ${{ secrets.AZURE_SQL_USERNAME }}
  AZURE_SQL_PASSWORD: ${{ secrets.AZURE_SQL_PASSWORD }}
  ODDS_API_KEY:       ${{ secrets.ODDS_API_KEY }}

jobs:
  odds-etl:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Microsoft ODBC Driver 18
        run: |
          sudo apt-get update
          sudo apt-get install -y curl gnupg apt-transport-https

          curl -sSL https://packages.microsoft.com/keys/microsoft.asc \
            | gpg --dearmor --batch --yes --no-tty \
            | sudo tee /usr/share/keyrings/microsoft-prod.gpg > /dev/null

          curl -sSL https://packages.microsoft.com/config/ubuntu/22.04/prod.list \
            | sudo tee /etc/apt/sources.list.d/mssql-release.list

          sudo apt-get update
          sudo ACCEPT_EULA=Y apt-get install -y msodbcsql18 unixodbc-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r etl/requirements.txt

      - name: Build CLI flags
        id: flags
        run: |
          FLAGS="--mode ${{ github.event.inputs.mode || 'backfill' }}"
          FLAGS="$FLAGS --sport ${{ github.event.inputs.sport || 'all' }}"
          FLAGS="$FLAGS --games ${{ github.event.inputs.games || '10' }}"
          FLAGS="$FLAGS --quota-floor ${{ github.event.inputs.quota_floor || '50000' }}"
          SEASON="${{ github.event.inputs.season }}"
          [ -n "$SEASON" ] && FLAGS="$FLAGS --season $SEASON"
          echo "flags=$FLAGS" >> $GITHUB_OUTPUT

      - name: Run Odds ETL
        run: python etl/odds_etl.py ${{ steps.flags.outputs.flags }}
