name: Odds ETL

on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: "discover | probe | backfill | mappings | upcoming"
        required: false
        default: "backfill"
      sport:
        description: "nfl, nba, mlb, or all"
        required: false
        default: "nba"
      season:
        description: "Season year. Leave blank for auto-detect."
        required: false
        default: ""
      snapshots:
        description: "Discover mode: max calendar dates to walk per run."
        required: false
        default: "50"
      games:
        description: "Backfill mode: max events per run."
        required: false
        default: "20"
      days_ahead:
        description: "Upcoming mode: days ahead to fetch."
        required: false
        default: "1"
      budget:
        description: "Max credits to spend this run. 0 = unlimited."
        required: false
        default: "0"

env:
  AZURE_SQL_SERVER:   ${{ secrets.AZURE_SQL_SERVER }}
  AZURE_SQL_DATABASE: ${{ secrets.AZURE_SQL_DATABASE }}
  AZURE_SQL_USERNAME: ${{ secrets.AZURE_SQL_USERNAME }}
  AZURE_SQL_PASSWORD: ${{ secrets.AZURE_SQL_PASSWORD }}
  ODDS_API_KEY:       ${{ secrets.ODDS_API_KEY }}

jobs:
  odds-etl:
    runs-on: [self-hosted, schnapp-runner]
    steps:
      - uses: actions/checkout@v4

      - name: Activate virtualenv
        run: echo "$HOME/venv/bin" >> $GITHUB_PATH

      - name: Build CLI flags
        id: flags
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            echo "flags=--mode upcoming --sport nba --days-ahead 1" >> $GITHUB_OUTPUT
            exit 0
          fi
          FLAGS="--mode ${{ github.event.inputs.mode || 'backfill' }}"
          FLAGS="$FLAGS --sport ${{ github.event.inputs.sport || 'nba' }}"
          FLAGS="$FLAGS --snapshots ${{ github.event.inputs.snapshots || '50' }}"
          FLAGS="$FLAGS --games ${{ github.event.inputs.games || '20' }}"
          FLAGS="$FLAGS --days-ahead ${{ github.event.inputs.days_ahead || '1' }}"
          FLAGS="$FLAGS --budget ${{ github.event.inputs.budget || '0' }}"
          SEASON="${{ github.event.inputs.season }}"
          [ -n "$SEASON" ] && FLAGS="$FLAGS --season $SEASON"
          echo "flags=$FLAGS" >> $GITHUB_OUTPUT

      - name: Run Odds ETL
        run: python etl/odds_etl.py ${{ steps.flags.outputs.flags }}
