name: Odds ETL

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "discover | probe | backfill | mappings | upcoming"
        required: false
        default: "backfill"
      sport:
        description: "nfl, nba, mlb, or all"
        required: false
        default: "nba"
      season:
        description: "Season year (NBA/NFL = start year, e.g. 2025 for 2025-26). Leave blank for auto-detect."
        required: false
        default: "2025"
      games:
        description: "Backfill mode: max events per run."
        required: false
        default: "20"
      days_ahead:
        description: "Upcoming mode: days ahead to fetch. Default 1 = next game day only."
        required: false
        default: "1"
      quota_floor:
        description: "Stop if credits fall below this."
        required: false
        default: "4500000"

env:
  AZURE_SQL_SERVER:   ${{ secrets.AZURE_SQL_SERVER }}
  AZURE_SQL_DATABASE: ${{ secrets.AZURE_SQL_DATABASE }}
  AZURE_SQL_USERNAME: ${{ secrets.AZURE_SQL_USERNAME }}
  AZURE_SQL_PASSWORD: ${{ secrets.AZURE_SQL_PASSWORD }}
  ODDS_API_KEY:       ${{ secrets.ODDS_API_KEY }}

jobs:
  odds-etl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ODBC Driver 18
        run: |
          sudo apt-get update -q
          sudo apt-get install -y curl gnupg apt-transport-https
          curl -sSL https://packages.microsoft.com/keys/microsoft.asc \
            | gpg --dearmor --batch --yes --no-tty \
            | sudo tee /usr/share/keyrings/microsoft-prod.gpg > /dev/null
          curl -sSL https://packages.microsoft.com/config/ubuntu/22.04/prod.list \
            | sudo tee /etc/apt/sources.list.d/mssql-release.list
          sudo apt-get update -q
          sudo ACCEPT_EULA=Y apt-get install -y msodbcsql18 unixodbc-dev

      - name: Install Python dependencies
        run: pip install -r etl/requirements.txt

      - name: Build CLI flags
        id: flags
        run: |
          FLAGS="--mode ${{ github.event.inputs.mode || 'backfill' }}"
          FLAGS="$FLAGS --sport ${{ github.event.inputs.sport || 'nba' }}"
          FLAGS="$FLAGS --games ${{ github.event.inputs.games || '20' }}"
          FLAGS="$FLAGS --days-ahead ${{ github.event.inputs.days_ahead || '1' }}"
          FLAGS="$FLAGS --quota-floor ${{ github.event.inputs.quota_floor || '4500000' }}"
          SEASON="${{ github.event.inputs.season }}"
          [ -n "$SEASON" ] && FLAGS="$FLAGS --season $SEASON"
          echo "flags=$FLAGS" >> $GITHUB_OUTPUT

      - name: Run Odds ETL
        run: python etl/odds_etl.py ${{ steps.flags.outputs.flags }}
