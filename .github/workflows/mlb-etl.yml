name: MLB Nightly ETL

on:
  schedule:
    - cron: '0 9 * * *'   # UTC 09:00 = 03:00 CST / 04:00 CDT
  workflow_dispatch:
    inputs:
      backfill:
        description: 'Include historical seasons (2023-2025)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

env:
  AZURE_SQL_SERVER:   ${{ secrets.AZURE_SQL_SERVER }}
  AZURE_SQL_DATABASE: ${{ secrets.AZURE_SQL_DATABASE }}
  AZURE_SQL_USERNAME: ${{ secrets.AZURE_SQL_USERNAME }}
  AZURE_SQL_PASSWORD: ${{ secrets.AZURE_SQL_PASSWORD }}

jobs:
  etl:
    runs-on: [self-hosted, schnapp-runner]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Activate venv
        run: echo "$HOME/venv/bin" >> $GITHUB_PATH

      - name: Run MLB ETL
        run: |
          if [ "${{ github.event.inputs.backfill }}" = "true" ]; then
            python etl/mlb_etl.py --backfill
          else
            python etl/mlb_etl.py
          fi
