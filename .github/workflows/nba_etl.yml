name: NBA ETL

on:
  # Nightly scheduled run
  schedule:
    # 09:00 UTC = 3:00 AM CST / 4:00 AM CDT
    - cron: '0 9 * * *'

  # Manual trigger with inputs
  workflow_dispatch:
    inputs:
      batch_size:
        description: "Number of game dates to process (backfill / catch-up)"
        required: false
        default: "10"

env:
  AZURE_SQL_SERVER:   ${{ secrets.AZURE_SQL_SERVER }}
  AZURE_SQL_DATABASE: ${{ secrets.AZURE_SQL_DATABASE }}
  AZURE_SQL_USERNAME: ${{ secrets.AZURE_SQL_USERNAME }}
  AZURE_SQL_PASSWORD: ${{ secrets.AZURE_SQL_PASSWORD }}

jobs:
  nba-etl:
    runs-on: ubuntu-latest

    steps:
      # --------------------------------------------------
      # 1. CHECKOUT CODE
      # --------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # --------------------------------------------------
      # 2. SET UP PYTHON
      # --------------------------------------------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # --------------------------------------------------
      # 3. INSTALL MICROSOFT ODBC DRIVER 18 (CI-SAFE)
      # --------------------------------------------------
      - name: Install Microsoft ODBC Driver 18
        run: |
          sudo apt-get update
          sudo apt-get install -y curl gnupg apt-transport-https

          curl -sSL https://packages.microsoft.com/keys/microsoft.asc \
            | gpg --dearmor --batch --yes --no-tty \
            | sudo tee /usr/share/keyrings/microsoft-prod.gpg > /dev/null

          curl -sSL https://packages.microsoft.com/config/ubuntu/22.04/prod.list \
            | sudo tee /etc/apt/sources.list.d/mssql-release.list

          sudo apt-get update
          sudo ACCEPT_EULA=Y apt-get install -y msodbcsql18 unixodbc-dev

      # --------------------------------------------------
      # 4. INSTALL PYTHON DEPENDENCIES
      # --------------------------------------------------
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # --------------------------------------------------
      # 5. RUN NBA ETL
      # --------------------------------------------------
      - name: Run NBA ETL
        run: |
          python etl/nba/nba_etl.py \
            --batch-size ${{ github.event.inputs.batch_size || 10 }}
``
