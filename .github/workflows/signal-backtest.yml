name: Signal Backtest

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Analysis mode'
        required: false
        default: 'all'
        type: choice
        options: [all, signals, odds]
      days:
        description: 'Lookback window (days)'
        required: false
        default: '90'

jobs:
  backtest:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        run: echo "$HOME/venv/bin" >> $GITHUB_PATH

      - name: Run signal backtest
        env:
          AZURE_SQL_SERVER:   ${{ secrets.AZURE_SQL_SERVER }}
          AZURE_SQL_DATABASE: ${{ secrets.AZURE_SQL_DATABASE }}
          AZURE_SQL_USERNAME: ${{ secrets.AZURE_SQL_USERNAME }}
          AZURE_SQL_PASSWORD: ${{ secrets.AZURE_SQL_PASSWORD }}
        run: |
          python3 etl/signal_backtest.py \
            --mode ${{ github.event.inputs.mode || 'all' }} \
            --days ${{ github.event.inputs.days || '90' }}
