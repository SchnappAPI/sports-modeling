name: NBA Box Score Fix Test

on:
  workflow_dispatch:
    inputs:
      game_ids:
        description: "Comma-separated NBA game IDs (e.g. 0022500001,0022500002)"
        required: true
        type: string
      season:
        description: "NBA season string (e.g. 2024-25)"
        required: false
        default: "2024-25"
        type: string
      skip_pt_stats:
        description: "Skip passing and rebound stats (box score only)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  nba-boxscore-test:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ODBC driver
        run: |
          curl -sSL https://packages.microsoft.com/keys/microsoft.asc \
            | sudo gpg --dearmor -o /usr/share/keyrings/microsoft.gpg
          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/microsoft.gpg] \
            https://packages.microsoft.com/ubuntu/22.04/prod jammy main" \
            | sudo tee /etc/apt/sources.list.d/mssql-release.list
          sudo apt-get update -qq
          ACCEPT_EULA=Y sudo apt-get install -y -qq msodbcsql18 unixodbc-dev

      - name: Install Python dependencies
        run: |
          pip install --quiet \
            nba_api==1.11.4 \
            pandas \
            sqlalchemy \
            pyodbc

      - name: Build arguments
        id: args
        run: |
          EXTRA=""
          if [ "${{ github.event.inputs.skip_pt_stats }}" = "true" ]; then
            EXTRA="--skip-pt-stats"
          fi
          echo "extra=$EXTRA" >> $GITHUB_OUTPUT

      - name: Run box score test ETL
        env:
          NBA_PROXY_URL:        ${{ secrets.NBA_PROXY_URL }}
          AZURE_SQL_SERVER:     ${{ secrets.AZURE_SQL_SERVER }}
          AZURE_SQL_DATABASE:   ${{ secrets.AZURE_SQL_DATABASE }}
          AZURE_SQL_USERNAME:   ${{ secrets.AZURE_SQL_USERNAME }}
          AZURE_SQL_PASSWORD:   ${{ secrets.AZURE_SQL_PASSWORD }}
        run: |
          python etl/nba_boxscore_test.py \
            --game-ids "${{ github.event.inputs.game_ids }}" \
            --season   "${{ github.event.inputs.season }}" \
            ${{ steps.args.outputs.extra }}

      - name: Upload box score summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nba-boxscore-summary-run-${{ github.run_number }}
          path: nba_boxscore_test_output.txt
          retention-days: 14

      - name: Upload passing stats log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nba-passing-stats-log-run-${{ github.run_number }}
          path: nba_passing_stats_log.csv
          retention-days: 90

      - name: Upload rebound chances log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nba-rebound-chances-log-run-${{ github.run_number }}
          path: nba_rebound_chances_log.csv
          retention-days: 90
