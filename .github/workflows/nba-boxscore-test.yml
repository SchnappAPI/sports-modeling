name: NBA Box Score Fix Test

on:
  workflow_dispatch:
    inputs:
      game_id:
        description: "NBA game ID to test (e.g. 0022500001)"
        required: true
        type: string
      season:
        description: "NBA season for passing stats (e.g. 2024-25)"
        required: false
        default: "2024-25"
        type: string

jobs:
  nba-boxscore-test:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ODBC driver
        run: |
          curl -sSL https://packages.microsoft.com/keys/microsoft.asc \
            | sudo gpg --dearmor -o /usr/share/keyrings/microsoft.gpg
          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/microsoft.gpg] \
            https://packages.microsoft.com/ubuntu/22.04/prod jammy main" \
            | sudo tee /etc/apt/sources.list.d/mssql-release.list
          sudo apt-get update -qq
          ACCEPT_EULA=Y sudo apt-get install -y -qq msodbcsql18 unixodbc-dev

      - name: Install Python dependencies
        run: |
          pip install --quiet \
            nba_api==1.11.4 \
            pandas \
            sqlalchemy \
            pyodbc

      - name: Run box score fix test
        env:
          NBA_PROXY_URL:        ${{ secrets.NBA_PROXY_URL }}
          AZURE_SQL_SERVER:     ${{ secrets.AZURE_SQL_SERVER }}
          AZURE_SQL_DATABASE:   ${{ secrets.AZURE_SQL_DATABASE }}
          AZURE_SQL_USERNAME:   ${{ secrets.AZURE_SQL_USERNAME }}
          AZURE_SQL_PASSWORD:   ${{ secrets.AZURE_SQL_PASSWORD }}
        run: |
          python etl/nba_boxscore_test.py \
            --game-id "${{ github.event.inputs.game_id }}" \
            --season  "${{ github.event.inputs.season }}"

      - name: Upload box score summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nba-boxscore-summary-${{ github.event.inputs.game_id }}
          path: nba_boxscore_test_${{ github.event.inputs.game_id }}.txt
          retention-days: 14

      - name: Upload passing stats log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nba-passing-stats-log-${{ github.run_number }}
          path: nba_passing_stats_log.csv
          retention-days: 90
