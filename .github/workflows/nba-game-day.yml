name: NBA Game Day

# Consolidated intra-day workflow. Runs continuously during game hours via
# self-re-dispatch from the schnapp-runner VM.
#
# Loop behavior:
#   - Cron fires once to kick off the loop each day.
#   - At the end of each cycle, if any games are active the workflow sleeps
#     270s on the runner then re-dispatches itself. This keeps the loop
#     running on the VM without depending on GitHub's scheduler.
#   - The loop self-terminates when no active games are found.
#   - Cron remains as a daily kickoff and fallback in case re-dispatch fails.
#
# Every cycle (~5 min):
#   1. Gate script   -- checks DB for pre-game/live games AND whether
#                       14+ minutes have elapsed since last grade
#   2. nba_live.py   -- syncs schedule status/scores, upserts live box scores
#
# When gate says run_odds_grading=true (~every 15 min):
#   3. odds_etl upcoming  -- refresh today's FanDuel lines
#   4. grade_props intraday -- re-grade moved standard lines
#   5. lineup_poll        -- fetch projected/confirmed lineups
#
# Backfill for newly-final games is dispatched to nba-backfill.yml separately.

on:
  schedule:
    - cron: '0 16 * * *'        # UTC 16:00 daily (noon ET) — loop kickoff
    - cron: '*/30 0-6 * * *'    # UTC 00:00-06:00 fallback (every 30 min)
  workflow_dispatch:
    inputs:
      skip_gate:
        description: "Set to 'true' to bypass gate and run all steps"
        required: false
        default: "false"

env:
  AZURE_SQL_SERVER:   ${{ secrets.AZURE_SQL_SERVER }}
  AZURE_SQL_DATABASE: ${{ secrets.AZURE_SQL_DATABASE }}
  AZURE_SQL_USERNAME: ${{ secrets.AZURE_SQL_USERNAME }}
  AZURE_SQL_PASSWORD: ${{ secrets.AZURE_SQL_PASSWORD }}
  ODDS_API_KEY:       ${{ secrets.ODDS_API_KEY }}
  NBA_PROXY_URL:      ${{ secrets.NBA_PROXY_URL }}
  GITHUB_PAT:         ${{ secrets.GITHUB_PAT }}

jobs:
  game-day:
    runs-on: [self-hosted, schnapp-runner]
    timeout-minutes: 12

    steps:
      - uses: actions/checkout@v4

      - name: Activate virtualenv
        run: echo "$HOME/venv/bin" >> $GITHUB_PATH

      - name: Game day gate
        id: gate
        run: python etl/game_day_gate.py

      - name: Schedule status + live box score
        if: |
          steps.gate.outputs.has_pregame == 'true' ||
          steps.gate.outputs.has_live == 'true' ||
          github.event.inputs.skip_gate == 'true'
        run: python etl/nba_live.py

      - name: Odds upcoming + intraday grading + lineup poll
        if: |
          (
            steps.gate.outputs.any_active == 'true' ||
            github.event.inputs.skip_gate == 'true'
          ) && (
            github.event_name == 'workflow_dispatch' ||
            steps.gate.outputs.run_odds_grading == 'true'
          )
        run: |
          python etl/odds_etl.py --mode upcoming --sport nba --days-ahead 1
          python grading/grade_props.py --mode intraday
          python etl/lineup_poll.py --hours-ahead 6

      - name: Dispatch backfill for newly-final games
        if: steps.gate.outputs.has_final == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_PAT }}
        run: |
          DATE="${{ steps.gate.outputs.final_date }}"
          if [ -n "$DATE" ]; then
            gh workflow run nba-backfill.yml \
              --repo "${{ github.repository }}" \
              --ref main \
              --field date="$DATE"
          fi

      - name: Sleep then re-dispatch (keep loop alive on VM)
        if: |
          steps.gate.outputs.any_active == 'true' ||
          github.event.inputs.skip_gate == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_PAT }}
        run: |
          sleep 270
          gh workflow run nba-game-day.yml \
            --repo "${{ github.repository }}" \
            --ref main
