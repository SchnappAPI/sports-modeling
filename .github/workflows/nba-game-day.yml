name: NBA Game Day

# On-demand intra-day workflow. Triggered by the Refresh Data button in the
# web app (via refresh-data.yml) for live game hours.
#
# This workflow handles scheduled backfill and overnight maintenance.
# During game hours, all live data updates come from refresh-data.yml
# triggered by the Refresh Data button.
#
# Scheduled runs:
#   - Daily 09:30 UTC (5:30 AM ET): backfill for overnight final games
#   - Every 30 min 00:00-06:00 UTC: late-game backfill + status sync
#
# Manual dispatch:
#   - skip_gate=true forces all steps regardless of game state

on:
  schedule:
    - cron: '30 9 * * *'        # UTC 09:30 daily — overnight backfill
    - cron: '*/30 0-6 * * *'    # UTC 00:00-06:00 — late-game backfill
  workflow_dispatch:
    inputs:
      skip_gate:
        description: "Set to 'true' to bypass gate and run all steps"
        required: false
        default: "false"

env:
  AZURE_SQL_SERVER:   ${{ secrets.AZURE_SQL_SERVER }}
  AZURE_SQL_DATABASE: ${{ secrets.AZURE_SQL_DATABASE }}
  AZURE_SQL_USERNAME: ${{ secrets.AZURE_SQL_USERNAME }}
  AZURE_SQL_PASSWORD: ${{ secrets.AZURE_SQL_PASSWORD }}
  ODDS_API_KEY:       ${{ secrets.ODDS_API_KEY }}
  NBA_PROXY_URL:      ${{ secrets.NBA_PROXY_URL }}
  GITHUB_PAT:         ${{ secrets.GITHUB_PAT }}

jobs:
  game-day:
    runs-on: [self-hosted, schnapp-runner]
    timeout-minutes: 12

    steps:
      - uses: actions/checkout@v4

      - name: Activate virtualenv
        run: echo "$HOME/venv/bin" >> $GITHUB_PATH

      - name: Game day gate
        id: gate
        run: python etl/game_day_gate.py

      - name: Schedule status + live box score
        if: |
          steps.gate.outputs.has_pregame == 'true' ||
          steps.gate.outputs.has_live == 'true' ||
          github.event.inputs.skip_gate == 'true'
        run: python etl/nba_live.py

      - name: Odds upcoming + intraday grading + lineup poll
        if: |
          (
            steps.gate.outputs.any_active == 'true' ||
            github.event.inputs.skip_gate == 'true'
          ) && (
            github.event_name == 'workflow_dispatch' ||
            steps.gate.outputs.run_odds_grading == 'true'
          )
        run: |
          python etl/odds_etl.py --mode upcoming --sport nba --days-ahead 1
          python grading/grade_props.py --mode intraday
          python etl/lineup_poll.py --hours-ahead 6

      - name: Dispatch backfill for newly-final games
        if: steps.gate.outputs.has_final == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_PAT }}
        run: |
          DATE="${{ steps.gate.outputs.final_date }}"
          if [ -n "$DATE" ]; then
            gh workflow run nba-backfill.yml \
              --repo "${{ github.repository }}" \
              --ref main \
              --field date="$DATE"
          fi
