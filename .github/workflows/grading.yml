name: NBA Grading

# Manual dispatch only -- nightly schedule moved to odds-grading-pipeline.yml.
# Use this workflow for one-off grading runs and historical backfill.

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'upcoming = grade today lines, backfill = process historical dates'
        required: false
        default: 'upcoming'
      date:
        description: 'Backfill mode only: grade a specific date (YYYY-MM-DD). Leave blank for auto.'
        required: false
        default: ''
      batch:
        description: 'Backfill mode only: max dates per run. Default 10, use 50+ for bulk backfill.'
        required: false
        default: ''

env:
  AZURE_SQL_SERVER:   ${{ secrets.AZURE_SQL_SERVER }}
  AZURE_SQL_DATABASE: ${{ secrets.AZURE_SQL_DATABASE }}
  AZURE_SQL_USERNAME: ${{ secrets.AZURE_SQL_USERNAME }}
  AZURE_SQL_PASSWORD: ${{ secrets.AZURE_SQL_PASSWORD }}

jobs:
  grade:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Microsoft ODBC Driver 18
        run: |
          curl -sSL https://packages.microsoft.com/keys/microsoft.asc \
            | sudo gpg --batch --yes --dearmor \
            -o /usr/share/keyrings/microsoft-prod.gpg
          curl -sSL https://packages.microsoft.com/config/ubuntu/22.04/prod.list \
            | sudo tee /etc/apt/sources.list.d/mssql-release.list
          sudo apt-get update
          sudo ACCEPT_EULA=Y apt-get install -y msodbcsql18 unixodbc-dev

      - name: Install Python dependencies
        run: pip install -r etl/requirements.txt

      - name: Run grading
        run: |
          MODE="${{ github.event.inputs.mode || 'upcoming' }}"
          ARGS="--mode $MODE"

          if [ "$MODE" = "backfill" ]; then
            if [ -n "${{ github.event.inputs.date }}" ]; then
              ARGS="$ARGS --date ${{ github.event.inputs.date }}"
            fi
            if [ -n "${{ github.event.inputs.batch }}" ]; then
              ARGS="$ARGS --batch ${{ github.event.inputs.batch }}"
            fi
          fi

          python grading/grade_props.py $ARGS
