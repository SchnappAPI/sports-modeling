name: NBA Grading

# Two triggers:
#   1. workflow_run: fires automatically after odds-etl.yml completes
#      successfully on its nightly schedule. This replaces the fragile
#      hardcoded 30-minute delay (odds at 10:00, grading at 10:30).
#      Grading now starts immediately after odds finishes, regardless
#      of how long odds takes.
#   2. workflow_dispatch: manual runs and backfill.

on:
  workflow_run:
    workflows: ["Odds ETL"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      mode:
        description: 'upcoming = grade today lines, backfill = process historical dates'
        required: false
        default: 'upcoming'
      date:
        description: 'Backfill mode only: grade a specific date (YYYY-MM-DD). Leave blank for auto.'
        required: false
        default: ''
      batch:
        description: 'Backfill mode only: max dates per Python call.'
        required: false
        default: '10'
      time_limit_minutes:
        description: 'Backfill mode only: minutes before exiting and re-dispatching. Max 330.'
        required: false
        default: '300'
      force:
        description: 'Backfill mode only: regrade dates already in daily_grades (existing rows UPDATE via MERGE, snapshots archived).'
        required: false
        default: 'false'

env:
  AZURE_SQL_SERVER:   ${{ secrets.AZURE_SQL_SERVER }}
  AZURE_SQL_DATABASE: ${{ secrets.AZURE_SQL_DATABASE }}
  AZURE_SQL_USERNAME: ${{ secrets.AZURE_SQL_USERNAME }}
  AZURE_SQL_PASSWORD: ${{ secrets.AZURE_SQL_PASSWORD }}

jobs:
  grade:
    # For workflow_run trigger: only run if odds ETL succeeded
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: [self-hosted, schnapp-runner]
    timeout-minutes: 350
    outputs:
      done: ${{ steps.run.outputs.done }}

    steps:
      - uses: actions/checkout@v4

      - name: Activate virtualenv
        run: echo "$HOME/venv/bin" >> $GITHUB_PATH

      - name: Run grading
        id: run
        env:
          MODE:               ${{ github.event.inputs.mode               || 'upcoming' }}
          DATE_INPUT:         ${{ github.event.inputs.date               || '' }}
          BATCH:              ${{ github.event.inputs.batch              || '10' }}
          TIME_LIMIT_MINUTES: ${{ github.event.inputs.time_limit_minutes || '300' }}
          FORCE:              ${{ github.event.inputs.force              || 'false' }}
        run: |
          set -euo pipefail

          if [ "$MODE" != "backfill" ]; then
            ARGS="--mode upcoming"
            [ -n "$DATE_INPUT" ] && ARGS="$ARGS --date $DATE_INPUT"
            python grading/grade_props.py $ARGS
            echo "done=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          START_SECONDS=$SECONDS
          TIME_LIMIT_SECONDS=$(( TIME_LIMIT_MINUTES * 60 ))
          DONE="false"
          echo "Backfill mode. Batch=$BATCH  Limit=${TIME_LIMIT_MINUTES}min"

          while true; do
            ELAPSED=$(( SECONDS - START_SECONDS ))
            REMAINING=$(( TIME_LIMIT_SECONDS - ELAPSED ))
            [ $REMAINING -le 60 ] && { echo "Approaching time limit. Exiting."; break; }

            ARGS="--mode backfill --batch $BATCH"
            [ -n "$DATE_INPUT" ] && ARGS="$ARGS --date $DATE_INPUT"
            [ "$FORCE" = "true" ] && ARGS="$ARGS --force"

            OUTPUT=$(python grading/grade_props.py $ARGS 2>&1) || { echo "$OUTPUT"; exit 1; }
            echo "$OUTPUT"

            if echo "$OUTPUT" | grep -q "Backfill: nothing to do."; then
              echo "Backfill complete."
              DONE="true"
              break
            fi
          done

          echo "done=$DONE" >> $GITHUB_OUTPUT

  redispatch:
    needs: grade
    runs-on: [self-hosted, schnapp-runner]
    if: always() && github.event.inputs.mode == 'backfill'
    steps:
      - name: Re-dispatch if backfill incomplete
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DONE:               ${{ needs.grade.outputs.done }}
          BATCH:              ${{ github.event.inputs.batch              || '10' }}
          TIME_LIMIT_MINUTES: ${{ github.event.inputs.time_limit_minutes || '300' }}
          DATE_INPUT:         ${{ github.event.inputs.date              || '' }}
          FORCE:              ${{ github.event.inputs.force              || 'false' }}
        run: |
          [ "${{ needs.grade.result }}" = "cancelled" ] && exit 0
          [ "$DONE" = "true" ] && exit 0
          gh workflow run grading.yml \
            --repo "${{ github.repository }}" \
            --ref "${{ github.ref_name }}" \
            --field mode="backfill" \
            --field date="$DATE_INPUT" \
            --field batch="$BATCH" \
            --field time_limit_minutes="$TIME_LIMIT_MINUTES" \
            --field force="$FORCE"
