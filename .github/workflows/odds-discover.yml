name: Odds Discover

# Walks the historical event catalog for all sport-season pairs in a single
# job. Each Python call processes a small batch of calendar dates and writes
# its cursor to odds.discover_cursors before returning. If the job dies at
# any point, re-dispatching resumes from each sport's last saved cursor.
#
# GitHub Actions hard limit is 6 hours per job. At ~2 seconds per date
# (1 API call + sleep) a 6-hour job processes roughly 10,000 dates. An NBA or
# MLB season spans ~200-250 relevant dates; an NFL season ~25. Three seasons
# per sport = ~1,400 total dates across all nine pairs, well within one run.
#
# The inner bash loop calls Python repeatedly in batches of snapshots_per_batch
# so that each batch is its own DB commit. There is no checkpoint stored on the
# runner filesystem -- the DB is the only state.
#
# Budget: each Python invocation is given a per-call budget. Discover costs
# 1 credit per calendar date, so budget_per_batch = snapshots_per_batch + a
# small buffer. The Python process exits cleanly when the budget is reached;
# the bash loop moves on to the next pair.

on:
  workflow_dispatch:
    inputs:
      seasons:
        description: "Comma-separated list of season start years to walk (e.g. 2023,2024,2025)"
        required: false
        default: "2023,2024,2025"
      snapshots_per_batch:
        description: "Calendar dates to process per Python call before looping."
        required: false
        default: "30"
      budget_per_batch:
        description: "Max credits per Python call. Should be slightly above snapshots_per_batch to cover retries. 0 = unlimited."
        required: false
        default: "40"
      quota_floor:
        description: "(Unused -- kept for reference only. Budget cap replaced this.)"
        required: false
        default: ""

env:
  AZURE_SQL_SERVER:   ${{ secrets.AZURE_SQL_SERVER }}
  AZURE_SQL_DATABASE: ${{ secrets.AZURE_SQL_DATABASE }}
  AZURE_SQL_USERNAME: ${{ secrets.AZURE_SQL_USERNAME }}
  AZURE_SQL_PASSWORD: ${{ secrets.AZURE_SQL_PASSWORD }}
  ODDS_API_KEY:       ${{ secrets.ODDS_API_KEY }}

jobs:
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 350   # 5h50m -- leaves buffer before GitHub's 6h hard cut

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ODBC Driver 18
        run: |
          sudo apt-get update -q
          sudo apt-get install -y curl gnupg apt-transport-https
          curl -sSL https://packages.microsoft.com/keys/microsoft.asc \
            | gpg --dearmor --batch --yes --no-tty \
            | sudo tee /usr/share/keyrings/microsoft-prod.gpg > /dev/null
          curl -sSL https://packages.microsoft.com/config/ubuntu/22.04/prod.list \
            | sudo tee /etc/apt/sources.list.d/mssql-release.list
          sudo apt-get update -q
          sudo ACCEPT_EULA=Y apt-get install -y msodbcsql18 unixodbc-dev

      - name: Install Python dependencies
        run: pip install -r etl/requirements.txt

      - name: Walk all sport-season pairs
        env:
          SEASONS:            ${{ github.event.inputs.seasons || '2023,2024,2025' }}
          SNAPSHOTS_PER_BATCH: ${{ github.event.inputs.snapshots_per_batch || '30' }}
          BUDGET_PER_BATCH:   ${{ github.event.inputs.budget_per_batch || '40' }}
        run: |
          set -euo pipefail
          IFS=',' read -ra SEASON_LIST <<< "$SEASONS"

          for SPORT in nba mlb nfl; do
            for SEASON in "${SEASON_LIST[@]}"; do
              SEASON="$(echo "$SEASON" | tr -d ' ')"
              echo ""
              echo "========================================"
              echo "  Discovering: $SPORT season $SEASON"
              echo "========================================"

              ITER=0
              MAX_ITER=500
              while [ $ITER -lt $MAX_ITER ]; do
                ITER=$((ITER + 1))
                echo "  --- Batch $ITER (sport=$SPORT season=$SEASON) ---"

                OUTPUT=$(python etl/odds_etl.py \
                  --mode discover \
                  --sport "$SPORT" \
                  --season "$SEASON" \
                  --snapshots "$SNAPSHOTS_PER_BATCH" \
                  --budget "$BUDGET_PER_BATCH" 2>&1) || {
                    echo "  Python exited non-zero. Stopping entire job."
                    echo "$OUTPUT"
                    exit 1
                  }

                echo "$OUTPUT"

                # Detect natural completion or budget-stop signals.
                if echo "$OUTPUT" | grep -qE \
                  "Walk complete|Reached beginning of history|Season has not started|Nothing to do|All .* discovered events loaded"; then
                  echo "  $SPORT $SEASON: fully walked. Moving to next pair."
                  break
                fi

                # Budget reached is a clean exit (code 0) with this message.
                # The cursor is already saved; the next iteration resumes from it.
                if echo "$OUTPUT" | grep -q "BUDGET REACHED"; then
                  echo "  Budget reached for this batch. Continuing loop (cursor saved)."
                fi

              done

              if [ $ITER -ge $MAX_ITER ]; then
                echo "  WARNING: hit iteration cap for $SPORT $SEASON. Re-dispatch to continue."
              fi

            done
          done

          echo ""
          echo "All sport-season pairs processed."
