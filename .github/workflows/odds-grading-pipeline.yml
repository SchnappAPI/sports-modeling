name: Odds and Grading Pipeline

# Nightly pipeline that runs odds ETL for all sports in parallel then
# triggers grading once all sports are done.
#
# Structure:
#   odds-nba \                   (parallel)
#   odds-mlb  --> grading
#   odds-nfl /
#
# Each odds job runs three modes sequentially within the sport:
#   1. backfill  -- load odds for any newly completed games
#   2. mappings  -- refresh event_game_map and player_map
#   3. upcoming  -- load today's pre-game lines
#
# Grading waits for all three odds jobs. It runs as long as at least
# one odds job succeeded (fail-fast: false on the odds jobs).
#
# The old nightly crons on odds-etl.yml and grading.yml are removed.
# Manual dispatch on those workflows still works for one-off use.

on:
  schedule:
    - cron: '0 10 * * *'   # UTC 10:00 = 4:00 AM CST / 5:00 AM CDT
  workflow_dispatch:
    inputs:
      backfill_games:
        description: 'Max events to backfill per sport. Covers new completed games since last run.'
        required: false
        default: '30'
      budget:
        description: 'Max credits per odds job. 0 = unlimited.'
        required: false
        default: '0'
      days_ahead:
        description: 'Days ahead for upcoming mode.'
        required: false
        default: '1'

env:
  AZURE_SQL_SERVER:   ${{ secrets.AZURE_SQL_SERVER }}
  AZURE_SQL_DATABASE: ${{ secrets.AZURE_SQL_DATABASE }}
  AZURE_SQL_USERNAME: ${{ secrets.AZURE_SQL_USERNAME }}
  AZURE_SQL_PASSWORD: ${{ secrets.AZURE_SQL_PASSWORD }}
  ODDS_API_KEY:       ${{ secrets.ODDS_API_KEY }}

jobs:

  # ---------------------------------------------------------------------------
  # Shared step template -- used by all three odds jobs
  # ---------------------------------------------------------------------------

  odds-nba:
    name: odds-nba
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ODBC Driver 18
        run: |
          sudo apt-get update -q
          sudo apt-get install -y curl gnupg apt-transport-https
          curl -sSL https://packages.microsoft.com/keys/microsoft.asc \
            | gpg --dearmor --batch --yes --no-tty \
            | sudo tee /usr/share/keyrings/microsoft-prod.gpg > /dev/null
          curl -sSL https://packages.microsoft.com/config/ubuntu/22.04/prod.list \
            | sudo tee /etc/apt/sources.list.d/mssql-release.list
          sudo apt-get update -q
          sudo ACCEPT_EULA=Y apt-get install -y msodbcsql18 unixodbc-dev

      - name: Install Python dependencies
        run: pip install -r etl/requirements.txt

      - name: Backfill new NBA games
        run: |
          python etl/odds_etl.py \
            --mode backfill \
            --sport nba \
            --games ${{ github.event.inputs.backfill_games || '30' }} \
            --budget ${{ github.event.inputs.budget || '0' }}

      - name: Mappings NBA
        run: python etl/odds_etl.py --mode mappings --sport nba

      - name: Upcoming NBA
        run: |
          python etl/odds_etl.py \
            --mode upcoming \
            --sport nba \
            --days-ahead ${{ github.event.inputs.days_ahead || '1' }} \
            --budget ${{ github.event.inputs.budget || '0' }}

  odds-mlb:
    name: odds-mlb
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ODBC Driver 18
        run: |
          sudo apt-get update -q
          sudo apt-get install -y curl gnupg apt-transport-https
          curl -sSL https://packages.microsoft.com/keys/microsoft.asc \
            | gpg --dearmor --batch --yes --no-tty \
            | sudo tee /usr/share/keyrings/microsoft-prod.gpg > /dev/null
          curl -sSL https://packages.microsoft.com/config/ubuntu/22.04/prod.list \
            | sudo tee /etc/apt/sources.list.d/mssql-release.list
          sudo apt-get update -q
          sudo ACCEPT_EULA=Y apt-get install -y msodbcsql18 unixodbc-dev

      - name: Install Python dependencies
        run: pip install -r etl/requirements.txt

      - name: Backfill new MLB games
        run: |
          python etl/odds_etl.py \
            --mode backfill \
            --sport mlb \
            --games ${{ github.event.inputs.backfill_games || '30' }} \
            --budget ${{ github.event.inputs.budget || '0' }}

      - name: Mappings MLB
        run: python etl/odds_etl.py --mode mappings --sport mlb

      - name: Upcoming MLB
        run: |
          python etl/odds_etl.py \
            --mode upcoming \
            --sport mlb \
            --days-ahead ${{ github.event.inputs.days_ahead || '1' }} \
            --budget ${{ github.event.inputs.budget || '0' }}

  odds-nfl:
    name: odds-nfl
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ODBC Driver 18
        run: |
          sudo apt-get update -q
          sudo apt-get install -y curl gnupg apt-transport-https
          curl -sSL https://packages.microsoft.com/keys/microsoft.asc \
            | gpg --dearmor --batch --yes --no-tty \
            | sudo tee /usr/share/keyrings/microsoft-prod.gpg > /dev/null
          curl -sSL https://packages.microsoft.com/config/ubuntu/22.04/prod.list \
            | sudo tee /etc/apt/sources.list.d/mssql-release.list
          sudo apt-get update -q
          sudo ACCEPT_EULA=Y apt-get install -y msodbcsql18 unixodbc-dev

      - name: Install Python dependencies
        run: pip install -r etl/requirements.txt

      - name: Backfill new NFL games
        run: |
          python etl/odds_etl.py \
            --mode backfill \
            --sport nfl \
            --games ${{ github.event.inputs.backfill_games || '30' }} \
            --budget ${{ github.event.inputs.budget || '0' }}

      - name: Mappings NFL
        run: python etl/odds_etl.py --mode mappings --sport nfl

      - name: Upcoming NFL
        run: |
          python etl/odds_etl.py \
            --mode upcoming \
            --sport nfl \
            --days-ahead ${{ github.event.inputs.days_ahead || '1' }} \
            --budget ${{ github.event.inputs.budget || '0' }}

  # ---------------------------------------------------------------------------
  # Grading -- waits for all three odds jobs
  # ---------------------------------------------------------------------------

  grading:
    name: grading
    needs: [odds-nba, odds-mlb, odds-nfl]
    # Run grading even if some odds jobs failed, as long as at least one
    # succeeded. This ensures NBA grades still run on days when MLB/NFL
    # odds jobs have nothing to do or encounter an error.
    if: |
      always() && (
        needs.odds-nba.result == 'success' ||
        needs.odds-mlb.result == 'success' ||
        needs.odds-nfl.result == 'success'
      )
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ODBC Driver 18
        run: |
          sudo apt-get update -q
          sudo apt-get install -y curl gnupg apt-transport-https
          curl -sSL https://packages.microsoft.com/keys/microsoft.asc \
            | gpg --dearmor --batch --yes --no-tty \
            | sudo tee /usr/share/keyrings/microsoft-prod.gpg > /dev/null
          curl -sSL https://packages.microsoft.com/config/ubuntu/22.04/prod.list \
            | sudo tee /etc/apt/sources.list.d/mssql-release.list
          sudo apt-get update -q
          sudo ACCEPT_EULA=Y apt-get install -y msodbcsql18 unixodbc-dev

      - name: Install Python dependencies
        run: pip install -r etl/requirements.txt

      - name: Run grading
        run: python grading/grade_props.py --mode upcoming
