name: Investigate Integrity Findings

on:
  workflow_dispatch:

env:
  AZURE_SQL_SERVER:   ${{ secrets.AZURE_SQL_SERVER }}
  AZURE_SQL_DATABASE: ${{ secrets.AZURE_SQL_DATABASE }}
  AZURE_SQL_USERNAME: ${{ secrets.AZURE_SQL_USERNAME }}
  AZURE_SQL_PASSWORD: ${{ secrets.AZURE_SQL_PASSWORD }}

jobs:
  investigate:
    runs-on: [self-hosted, schnapp-runner]
    steps:
      - uses: actions/checkout@v4
      - name: Activate venv
        run: echo "$HOME/venv/bin" >> $GITHUB_PATH
      - name: Follow-up investigations
        run: |
          python << 'PYEOF'
          from etl.db import get_engine
          from sqlalchemy import text
          eng = get_engine()
          with eng.connect() as conn:

              print("=" * 78)
              print("F. event_game_map NULL game_id by sport_key + year")
              print("=" * 78)
              rows = conn.execute(text("""
                  SELECT sport_key, YEAR(game_date) AS yr, COUNT(*) AS cnt
                  FROM odds.event_game_map
                  WHERE game_id IS NULL
                  GROUP BY sport_key, YEAR(game_date)
                  ORDER BY cnt DESC
              """)).fetchall()
              for r in rows:
                  print(f"    {r.sport_key} {r.yr}: {r.cnt}")

              print()
              print("=" * 78)
              print("G. Player-prop markets where outcome_point is always NULL")
              print("=" * 78)
              rows = conn.execute(text("""
                  SELECT market_key,
                         COUNT(*) AS total,
                         SUM(CASE WHEN outcome_point IS NULL THEN 1 ELSE 0 END) AS null_count,
                         SUM(CASE WHEN outcome_point IS NOT NULL THEN 1 ELSE 0 END) AS notnull_count
                  FROM odds.player_props
                  GROUP BY market_key
                  ORDER BY null_count DESC
              """)).fetchall()
              for r in rows:
                  tag = " [all NULL]" if r.notnull_count == 0 else (" [all set]" if r.null_count == 0 else " [mixed]")
                  print(f"    {r.market_key}: total={r.total} null={r.null_count} set={r.notnull_count}{tag}")

              print()
              print("=" * 78)
              print("H. upcoming_player_props same breakdown")
              print("=" * 78)
              rows = conn.execute(text("""
                  SELECT market_key,
                         COUNT(*) AS total,
                         SUM(CASE WHEN outcome_point IS NULL THEN 1 ELSE 0 END) AS null_count
                  FROM odds.upcoming_player_props
                  GROUP BY market_key
                  ORDER BY null_count DESC
              """)).fetchall()
              for r in rows:
                  print(f"    {r.market_key}: total={r.total} null={r.null_count}")

              print()
              print("=" * 78)
              print("I. upcoming_events NULL home_tricode by sport_key")
              print("=" * 78)
              rows = conn.execute(text("""
                  SELECT sport_key, COUNT(*) AS cnt
                  FROM odds.upcoming_events
                  WHERE home_tricode IS NULL
                  GROUP BY sport_key
              """)).fetchall()
              for r in rows:
                  print(f"    {r.sport_key or '(NULL)'}: {r.cnt}")

              print()
              print("=" * 78)
              print("J. nba.schedule NULL team_ids — All-Star ids?")
              print("=" * 78)
              rows = conn.execute(text("""
                  SELECT TOP 20 game_id, game_date, game_status, home_team_id, away_team_id, home_team_tricode, away_team_tricode
                  FROM nba.schedule
                  WHERE home_team_id IS NULL OR away_team_id IS NULL
                  ORDER BY game_date DESC
              """)).fetchall()
              for r in rows:
                  print(f"    {r.game_id} / {r.game_date} status={r.game_status} home={r.home_team_tricode}/{r.home_team_id} away={r.away_team_tricode}/{r.away_team_id}")
          PYEOF
