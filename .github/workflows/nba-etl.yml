name: NBA ETL

on:
  schedule:
    - cron: '0 9 * * *'   # UTC 09:00 = 3:00 AM CST / 4:00 AM CDT
  workflow_dispatch:
    inputs:
      days:
        description: 'Number of game dates to process per run (default: 3)'
        required: false
        default: '3'
      season:
        description: 'Season to target, e.g. 2025-26 (default: 2025-26)'
        required: false
        default: '2025-26'
      load_rosters:
        description: 'Force roster reload from CommonTeamRoster (true/false)'
        required: false
        default: 'false'
      skip_pt_stats:
        description: 'Skip passing and rebounding tracking stats (true/false)'
        required: false
        default: 'false'

env:
  AZURE_SQL_SERVER:   ${{ secrets.AZURE_SQL_SERVER }}
  AZURE_SQL_DATABASE: ${{ secrets.AZURE_SQL_DATABASE }}
  AZURE_SQL_USERNAME: ${{ secrets.AZURE_SQL_USERNAME }}
  AZURE_SQL_PASSWORD: ${{ secrets.AZURE_SQL_PASSWORD }}
  NBA_PROXY_URL:      ${{ secrets.NBA_PROXY_URL }}

jobs:
  etl:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Microsoft ODBC Driver 18
        run: |
          curl -sSL https://packages.microsoft.com/keys/microsoft.asc \
            | sudo gpg --batch --yes --dearmor \
                -o /usr/share/keyrings/microsoft-prod.gpg
          curl -sSL https://packages.microsoft.com/config/ubuntu/22.04/prod.list \
            | sudo tee /etc/apt/sources.list.d/mssql-release.list
          sudo apt-get update
          sudo ACCEPT_EULA=Y apt-get install -y msodbcsql18 unixodbc-dev

      - name: Install dependencies
        run: pip install -r etl/requirements.txt

      - name: Run NBA ETL
        run: |
          DAYS="${{ github.event.inputs.days }}"
          SEASON="${{ github.event.inputs.season }}"
          DAYS="${DAYS:-3}"
          SEASON="${SEASON:-2025-26}"

          ARGS="--days $DAYS --season $SEASON"

          if [ "${{ github.event.inputs.load_rosters }}" = "true" ]; then
            ARGS="$ARGS --load-rosters"
          fi

          if [ "${{ github.event.inputs.skip_pt_stats }}" = "true" ]; then
            ARGS="$ARGS --skip-pt-stats"
          fi

          python etl/nba_etl.py $ARGS
