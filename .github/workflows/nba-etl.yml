name: NBA Nightly ETL

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:
    inputs:
      days:
        description: "Number of game dates to process per table"
        required: false
        default: "10"
      load_rosters:
        description: "Force player roster reload (true/false)"
        required: false
        default: "false"
      skip_pt_stats:
        description: "Skip passing and rebounding stats (true/false)"
        required: false
        default: "false"
      skip_lineups:
        description: "Skip daily lineups (true/false)"
        required: false
        default: "false"

env:
  AZURE_SQL_SERVER:   ${{ secrets.AZURE_SQL_SERVER }}
  AZURE_SQL_DATABASE: ${{ secrets.AZURE_SQL_DATABASE }}
  AZURE_SQL_USERNAME: ${{ secrets.AZURE_SQL_USERNAME }}
  AZURE_SQL_PASSWORD: ${{ secrets.AZURE_SQL_PASSWORD }}
  NBA_PROXY_URL:      ${{ secrets.NBA_PROXY_URL }}

jobs:
  nba-etl:
    runs-on: [self-hosted, schnapp-runner]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Activate virtualenv
        run: echo "$HOME/venv/bin" >> $GITHUB_PATH

      - name: Build CLI flags
        id: flags
        run: |
          FLAGS="--days ${{ github.event.inputs.days || '10' }}"
          [ "${{ github.event.inputs.load_rosters }}" = "true" ] && FLAGS="$FLAGS --load-rosters"
          [ "${{ github.event.inputs.skip_pt_stats }}" = "true" ] && FLAGS="$FLAGS --skip-pt-stats"
          [ "${{ github.event.inputs.skip_lineups }}"  = "true" ] && FLAGS="$FLAGS --skip-lineups"
          echo "flags=$FLAGS" >> $GITHUB_OUTPUT

      - name: Run NBA ETL
        run: python etl/nba_etl.py ${{ steps.flags.outputs.flags }}
