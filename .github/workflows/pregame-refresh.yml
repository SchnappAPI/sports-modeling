name: Pre-Game Refresh

# Runs every 30 minutes from 10:00 AM ET (UTC 14:00) through 11:00 PM ET (UTC 03:00).
# Chains odds ETL (upcoming) then grading in intraday mode.
#
# Intraday grading only re-grades standard lines where the posted line has
# moved since the last grade. Alternate lines are never re-graded intraday.
#
# Game gate: a Python one-liner checks nba.schedule for any non-final game
# starting within 3 hours. If none qualify, both ETL steps are skipped.
# This avoids burning Odds API quota on days with no upcoming games.

on:
  schedule:
    - cron: '0,30 14-23 * * *'   # UTC 14:00-23:30 (10:00 AM-7:30 PM ET)
    - cron: '0,30 0-3  * * *'    # UTC 00:00-03:30 (8:00-11:30 PM ET)
  workflow_dispatch:
    inputs:
      skip_gate:
        description: "Set to 'true' to bypass the game window gate and always run."
        required: false
        default: "false"

env:
  AZURE_SQL_SERVER:   ${{ secrets.AZURE_SQL_SERVER }}
  AZURE_SQL_DATABASE: ${{ secrets.AZURE_SQL_DATABASE }}
  AZURE_SQL_USERNAME: ${{ secrets.AZURE_SQL_USERNAME }}
  AZURE_SQL_PASSWORD: ${{ secrets.AZURE_SQL_PASSWORD }}
  ODDS_API_KEY:       ${{ secrets.ODDS_API_KEY }}

jobs:
  pregame-refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ODBC Driver 18
        run: |
          sudo apt-get update -q
          sudo apt-get install -y curl gnupg apt-transport-https
          curl -sSL https://packages.microsoft.com/keys/microsoft.asc \
            | gpg --dearmor --batch --yes --no-tty \
            | sudo tee /usr/share/keyrings/microsoft-prod.gpg > /dev/null
          curl -sSL https://packages.microsoft.com/config/ubuntu/22.04/prod.list \
            | sudo tee /etc/apt/sources.list.d/mssql-release.list
          sudo apt-get update -q
          sudo ACCEPT_EULA=Y apt-get install -y msodbcsql18 unixodbc-dev

      - name: Install Python dependencies
        run: pip install -r etl/requirements.txt

      - name: Check game window gate
        id: gate
        run: |
          SKIP="${{ github.event.inputs.skip_gate }}"
          if [ "$SKIP" = "true" ]; then
            echo "Gate bypassed via workflow_dispatch."
            echo "run=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          RESULT=$(python - <<'PYEOF'
import os, sys, time
from datetime import date, datetime, timezone, timedelta
from sqlalchemy import create_engine, text
import re

server   = os.environ["AZURE_SQL_SERVER"]
database = os.environ["AZURE_SQL_DATABASE"]
username = os.environ["AZURE_SQL_USERNAME"]
password = os.environ["AZURE_SQL_PASSWORD"]
conn_str = (
    f"mssql+pyodbc://{username}:{password}"
    f"@{server}/{database}"
    "?driver=ODBC+Driver+18+for+SQL+Server"
    "&Encrypt=yes&TrustServerCertificate=no"
    "&Connection+Timeout=90"
)
engine = create_engine(conn_str, fast_executemany=True)
for attempt in range(1, 4):
    try:
        with engine.connect() as conn:
            conn.execute(text("SELECT 1"))
        break
    except Exception:
        if attempt < 3:
            time.sleep(60)
        else:
            print("false")
            sys.exit(0)

today   = date.today()
now_utc = datetime.now(timezone.utc)
cutoff  = now_utc + timedelta(hours=3)

time_re = re.compile(r"(\d{1,2}):(\d{2})\s*(am|pm)", re.IGNORECASE)

with engine.connect() as conn:
    rows = [
        dict(r._mapping)
        for r in conn.execute(
            text(
                "SELECT game_status, game_status_text FROM nba.schedule "
                "WHERE game_date = :today AND (game_status IS NULL OR game_status != 3)"
            ),
            {"today": today},
        )
    ]

for row in rows:
    gst = row.get("game_status_text") or ""
    m   = time_re.search(gst)
    if not m:
        print("true")
        sys.exit(0)
    hour   = int(m.group(1))
    minute = int(m.group(2))
    ampm   = m.group(3).lower()
    if ampm == "pm" and hour != 12:
        hour += 12
    elif ampm == "am" and hour == 12:
        hour = 0
    et_tz     = timezone(timedelta(hours=-4))
    start_et  = datetime(today.year, today.month, today.day, hour, minute, tzinfo=et_tz)
    start_utc = start_et.astimezone(timezone.utc)
    if start_utc <= cutoff:
        print("true")
        sys.exit(0)

print("false")
PYEOF
          )
          echo "Gate result: $RESULT"
          echo "run=$RESULT" >> $GITHUB_OUTPUT

      - name: Run odds ETL (upcoming)
        if: steps.gate.outputs.run == 'true'
        run: python etl/odds_etl.py --mode upcoming --sport nba --days-ahead 1

      - name: Run grading (intraday — moved standard lines only)
        if: steps.gate.outputs.run == 'true'
        run: python grading/grade_props.py --mode intraday
