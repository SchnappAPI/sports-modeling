name: NBA Daily Test
on:
  workflow_dispatch:
    inputs:
      date:
        description: "Game date in YYYY-MM-DD format (leave blank for yesterday)"
        required: false
        default: ""
      season:
        description: "NBA season string, e.g. 2025-26"
        required: false
        default: "2025-26"
      skip_pt_stats:
        description: "Skip passing and rebounding tracking stats (true/false)"
        required: false
        default: "false"
jobs:
  nba-daily-test:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ODBC driver
        run: |
          curl -sSL https://packages.microsoft.com/keys/microsoft.asc \
            | sudo gpg --batch --yes --dearmor \
                -o /usr/share/keyrings/microsoft-prod.gpg
          curl -sSL https://packages.microsoft.com/config/ubuntu/22.04/prod.list \
            | sudo tee /etc/apt/sources.list.d/mssql-release.list
          sudo apt-get update
          sudo ACCEPT_EULA=Y apt-get install -y msodbcsql18 unixodbc-dev
      - name: Install Python dependencies
        run: pip install -r etl/requirements.txt
      - name: Run NBA daily test
        env:
          NBA_PROXY_URL:      ${{ secrets.NBA_PROXY_URL }}
          AZURE_SQL_SERVER:   ${{ secrets.AZURE_SQL_SERVER }}
          AZURE_SQL_DATABASE: ${{ secrets.AZURE_SQL_DATABASE }}
          AZURE_SQL_USERNAME: ${{ secrets.AZURE_SQL_USERNAME }}
          AZURE_SQL_PASSWORD: ${{ secrets.AZURE_SQL_PASSWORD }}
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.date }}" ]; then
            ARGS="$ARGS --date ${{ github.event.inputs.date }}"
          fi
          if [ -n "${{ github.event.inputs.season }}" ]; then
            ARGS="$ARGS --season ${{ github.event.inputs.season }}"
          fi
          if [ "${{ github.event.inputs.skip_pt_stats }}" = "true" ]; then
            ARGS="$ARGS --skip-pt-stats"
          fi
          python etl/nba_daily_test.py $ARGS
      - name: Upload test output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nba-daily-test-${{ github.event.inputs.date || 'yesterday' }}
          path: |
            nba_daily_test_*.txt
            nba_passing_stats_log.csv
            nba_rebound_chances_log.csv
          retention-days: 14
