name: NBA Live Box Score (RETIRED)

# Retired 2026-04-04. Replaced by nba-game-day.yml.
# Kept as dispatch-only for manual one-off runs.

on:
  workflow_dispatch:
    inputs:
      force:
        description: 'Skip gate check'
        required: false
        default: 'false'

jobs:
  live-update:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install Microsoft ODBC Driver 18
        run: |
          curl -sSL https://packages.microsoft.com/keys/microsoft.asc | sudo apt-key add -
          curl -sSL https://packages.microsoft.com/config/ubuntu/22.04/prod.list \
            | sudo tee /etc/apt/sources.list.d/mssql-release.list
          sudo apt-get update -qq
          ACCEPT_EULA=Y sudo apt-get install -y -qq msodbcsql18 unixodbc-dev
      - name: Install Python dependencies
        run: pip install -r etl/requirements.txt
      - name: Run live box score update
        env:
          AZURE_SQL_SERVER:   ${{ secrets.AZURE_SQL_SERVER }}
          AZURE_SQL_DATABASE: ${{ secrets.AZURE_SQL_DATABASE }}
          AZURE_SQL_USERNAME: ${{ secrets.AZURE_SQL_USERNAME }}
          AZURE_SQL_PASSWORD: ${{ secrets.AZURE_SQL_PASSWORD }}
          NBA_PROXY_URL:      ${{ secrets.NBA_PROXY_URL }}
        run: python etl/nba_live.py
