name: NBA Nightly ETL

on:
  schedule:
    - cron: '0 9 * * *'   # UTC 09:00 = 3:00 AM CST / 4:00 AM CDT
  workflow_dispatch:
    inputs:
      batch:
        description: 'Number of unloaded games to process (default: 30)'
        required: false
        default: '30'
      season:
        description: 'Season to target, e.g. 2024-25 (default: 2024-25)'
        required: false
        default: '2024-25'

env:
  AZURE_SQL_SERVER:   ${{ secrets.AZURE_SQL_SERVER }}
  AZURE_SQL_DATABASE: ${{ secrets.AZURE_SQL_DATABASE }}
  AZURE_SQL_USERNAME: ${{ secrets.AZURE_SQL_USERNAME }}
  AZURE_SQL_PASSWORD: ${{ secrets.AZURE_SQL_PASSWORD }}
  NBA_PROXY_URL:      ${{ secrets.NBA_PROXY_URL }}

jobs:
  etl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Microsoft ODBC Driver 18
        run: |
          curl -sSL https://packages.microsoft.com/keys/microsoft.asc \
            | sudo gpg --batch --yes --dearmor \
                -o /usr/share/keyrings/microsoft-prod.gpg
          curl -sSL https://packages.microsoft.com/config/ubuntu/22.04/prod.list \
            | sudo tee /etc/apt/sources.list.d/mssql-release.list
          sudo apt-get update
          sudo ACCEPT_EULA=Y apt-get install -y msodbcsql18 unixodbc-dev

      - name: Install dependencies
        run: pip install -r etl/requirements.txt

      - name: Run NBA ETL
        run: |
          BATCH="${{ github.event.inputs.batch }}"
          SEASON="${{ github.event.inputs.season }}"
          BATCH="${BATCH:-30}"
          SEASON="${SEASON:-2024-25}"
          python etl/nba_etl.py --batch "$BATCH" --season "$SEASON"
